version: "2"

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - ineffassign
    - unused
  settings:
    staticcheck:
      # SA* only: bug detectors, not style/quickfix.
      checks:
        - SA*
  exclusions:
    generated: lax
    rules:
      - path: internal/arlington/model_gen\.go
        linters:
          - govet
          - staticcheck
          - unused
